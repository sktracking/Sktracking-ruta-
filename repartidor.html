<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogiTrack – Repartidor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F2F8;color:#111;min-height:100vh}
.topbar{background:#0F1623;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.topbar-title{color:#fff;font-weight:800;font-size:16px}
.topbar-user{color:#6B7A99;font-size:13px}
.btn-logout{background:none;border:1px solid #EF4444;color:#EF4444;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700}
.main{padding:20px}
.welcome{background:linear-gradient(135deg,#4F7CF7,#3B5EE8);border-radius:14px;padding:20px 24px;color:#fff;margin-bottom:20px}
.welcome-name{font-size:20px;font-weight:800}
.welcome-sub{font-size:13px;opacity:.8;margin-top:4px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:4px solid #4F7CF7}
.stat-val{font-size:24px;font-weight:800}
.stat-label{font-size:12px;color:#666;margin-top:2px}
.section-title{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pkg-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:12px;border-left:4px solid #F59E0B}
.pkg-card.en_ruta{border-left-color:#3B82F6}
.pkg-card.entregado{border-left-color:#10B981;opacity:.7}
.pkg-card.fallido{border-left-color:#EF4444;opacity:.7}
.pkg-id{font-family:monospace;font-weight:700;color:#4F7CF7;font-size:12px}
.pkg-dest{font-weight:700;font-size:15px;margin:4px 0}
.pkg-dir{font-size:13px;color:#666;margin-bottom:10px}
.pkg-meta{font-size:12px;color:#888;margin-bottom:12px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:10px}
.badge-pendiente{background:#FEF3C7;color:#F59E0B}
.badge-en_ruta{background:#DBEAFE;color:#3B82F6}
.badge-entregado{background:#D1FAE5;color:#10B981}
.badge-fallido{background:#FEE2E2;color:#EF4444}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:13px}
.btn-blue{background:#3B82F6;color:#fff}
.btn-green{background:#10B981;color:#fff}
.btn-red{background:#EF4444;color:#fff}
.btn-gray{background:#F0F2F8;color:#555;border:1px solid #E5E7EB}
.btn:hover{opacity:.85}
.empty{text-align:center;color:#aaa;padding:40px;font-size:14px}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #E5E7EB;background:#fff;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s}
.filter-btn.active{background:#4F7CF7;color:#fff;border-color:#4F7CF7}
#toast{position:fixed;bottom:20px;right:20px;left:20px;background:#111;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
#toast.show{opacity:1}
.refresh-btn{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#555;font-weight:600}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">🚚 LogiTrack</div>
    <div class="topbar-user" id="rep-zona"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="refresh-btn" onclick="loadMisPaquetes()">🔄</button>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</div>

<div class="main">
  <div class="welcome">
    <div class="welcome-name">Hola, <span id="rep-nombre">Repartidor</span> 👋</div>
    <div class="welcome-sub" id="rep-fecha"></div>
  </div>

  <div class="stat-row" id="stat-row"></div>

  <div class="section-title">📦 Mis Paquetes</div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('pendiente',this)">Pendientes</button>
    <button class="filter-btn" onclick="setFilter('en_ruta',this)">En ruta</button>
    <button class="filter-btn" onclick="setFilter('entregado',this)">Entregados</button>
    <button class="filter-btn" onclick="setFilter('fallido',this)">Fallidos</button>
  </div>
  <div id="pkg-list"></div>
</div>

<div id="toast"></div>

<script>
const SUPA_URL='https://pqnxhaqioywljftmlhjk.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzIINiIsInR5cCI6IkpXVCJ9.eyJpc3MlOiJzdXBhVnrzZSIsInJlZtT6InBxb';
const H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

const user=JSON.parse(localStorage.getItem('lt_user')||'null');
if(!user||user.rol==='admin'){window.location.href='/';}

document.getElementById('rep-nombre').textContent=user.nombre;
document.getElementById('rep-zona').textContent=user.zona?'Zona: '+user.zona:'';
document.getElementById('rep-fecha').textContent=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

let misPaquetes=[];
let filtroActivo='todos';

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function logout(){localStorage.removeItem('lt_user');window.location.href='/';}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function loadMisPaquetes(){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/paquetes?repartidor_id=eq.${user.id}&order=created_at.desc`,{headers:H});
    misPaquetes=await res.json();
    renderStats();renderPaquetes();
  }catch(e){toast('❌ Error cargando paquetes');}
}

function renderStats(){
  const total=misPaquetes.length;
  const ent=misPaquetes.filter(p=>p.estado==='entregado').length;
  const ruta=misPaquetes.filter(p=>p.estado==='en_ruta').length;
  const pend=misPaquetes.filter(p=>p.estado==='pendiente').length;
  const tasa=total?Math.round(ent/total*100):0;
  document.getElementById('stat-row').innerHTML=`
    <div class="stat-card" style="border-left-color:#10B981"><div class="stat-val" style="color:#10B981">${ent}</div><div class="stat-label">Entregados hoy</div></div>
    <div class="stat-card" style="border-left-color:#3B82F6"><div class="stat-val" style="color:#3B82F6">${ruta}</div><div class="stat-label">En ruta</div></div>
    <div class="stat-card" style="border-left-color:#F59E0B"><div class="stat-val" style="color:#F59E0B">${pend}</div><div class="stat-label">Pendientes</div></div>
    <div class="stat-card" style="border-left-color:#4F7CF7"><div class="stat-val">${tasa}%</div><div class="stat-label">Tasa de éxito</div></div>
  `;
}

function setFilter(f,btn){
  filtroActivo=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPaquetes();
}

function renderPaquetes(){
  const filtered=filtroActivo==='todos'?misPaquetes:misPaquetes.filter(p=>p.estado===filtroActivo);
  const ESTADOS={pendiente:'Pendiente',en_ruta:'En ruta',entregado:'Entregado',fallido:'Fallido'};
  document.getElementById('pkg-list').innerHTML=filtered.length?filtered.map(p=>`
    <div class="pkg-card ${p.estado}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="pkg-id">${h(p.id)}</div>
        <span class="badge badge-${p.estado}">${ESTADOS[p.estado]||p.estado}</span>
      </div>
      <div class="pkg-dest">👤 ${h(p.destinatario)}</div>
      <div class="pkg-dir">📍 ${h(p.direccion)}</div>
      <div class="pkg-meta">⚖️ ${p.peso||1} kg · 📅 ${h(p.fecha)}${p.hora?' · ✅ '+h(p.hora):''}${p.notas?'<br>📝 '+h(p.notas):''}</div>
      ${p.estado==='pendiente'?`
        <div class="btn-row">
          <button class="btn btn-blue" onclick="cambiarEstado('${p.id}','en_ruta')">🚚 Iniciar entrega</button>
        </div>`:
      p.estado==='en_ruta'?`
        <div class="btn-row">
          <button class="btn btn-green" onclick="cambiarEstado('${p.id}','entregado')">✅ Entregado</button>
          <button class="btn btn-red" onclick="cambiarEstado('${p.id}','fallido')">❌ No entregado</button>
        </div>`:''}
    </div>
  `).join(''):`<div class="empty">No hay paquetes en esta categoría</div>`;
}

async function cambiarEstado(pkgId,nuevoEstado){
  try{
    const hora=nuevoEstado==='entregado'?new Date().toTimeString().slice(0,5):null;
    const body={estado:nuevoEstado};if(hora)body.hora=hora;
    await fetch(`${SUPA_URL}/rest/v1/paquetes?id=eq.${pkgId}`,{method:'PATCH',headers:H,body:JSON.stringify(body)});
    const idx=misPaquetes.findIndex(p=>p.id===pkgId);
    if(idx!==-1){misPaquetes[idx].estado=nuevoEstado;if(hora)misPaquetes[idx].hora=hora;}
    renderStats();renderPaquetes();
    const msgs={en_ruta:'🚚 ¡Entrega iniciada!',entregado:'✅ ¡Paquete entregado!',fallido:'❌ Marcado como no entregado'};
    toast(msgs[nuevoEstado]||'Actualizado');
  }catch(e){toast('❌ Error. Comprueba tu conexión');}
}

loadMisPaquetes();
setInterval(loadMisPaquetes,30000);
</script>
</body>
</html>
